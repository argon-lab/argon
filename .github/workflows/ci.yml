name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download

    - name: Start MinIO (S3 chunk store backend)
      run: |
        docker run -d --name ci-minio -p 9010:9000 \
          -e MINIO_ROOT_USER=argon -e MINIO_ROOT_PASSWORD=argon12345 \
          minio/minio server /data
        for i in $(seq 1 30); do
          curl -sf http://localhost:9010/minio/health/live && break
          sleep 1
        done

    - name: Run tests
      env:
        ARGON_TEST_S3_ENDPOINT: http://localhost:9010
        ARGON_TEST_S3_BUCKET: argon-test
        AWS_ACCESS_KEY_ID: argon
        AWS_SECRET_ACCESS_KEY: argon12345
        AWS_REGION: us-east-1
      run: go test -v ./...
    
    - name: Build CLI
      working-directory: ./cli
      run: go build -v .
    
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m